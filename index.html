<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2027 상반기 휴양지 여행 비교</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  @font-face{
    font-family:'GmarketSans';
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
    font-weight:500;
    font-style:normal;
  }
  @font-face{
    font-family:'GmarketSans';
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
    font-weight:700;
    font-style:normal;
  }
  :root{
    --sea-900:#013049;
    --sea-700:#00577d;
    --sea-500:#0f7fa8;
    --sea-300:#5db6cf;
    --sea-100:#e6f2f5;
    --sand:#f7f1e3;
    --accent:#00c189;
    --accent-bg:#e1faf1;
    --ok:#00a274;
    --ok-bg:#e1faf1;
    --fail:#c94b4b;
    --fail-bg:#fbeaea;
    --ink:#1b2a37;
    --muted:#6b7c8c;
    --card:#ffffff;
    --line:#e1e9ef;
    --radius:14px;
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:linear-gradient(180deg,var(--sea-100) 0%, #fff 320px);
    color:var(--ink);
    line-height:1.5;
    padding-bottom:60px;
  }
  header.hero{
    position:relative;
    overflow:hidden;
    background:
      linear-gradient(180deg, rgba(1,48,73,.18) 0%, rgba(1,48,73,.45) 100%),
      url('img/main.jpg') center 45%/cover no-repeat;
    color:#fff;
    padding:44px 20px 32px;
    text-align:center;
    min-height:220px;
  }
  header.hero h1{
    margin:0;
    font-family:'GmarketSans','Pretendard',sans-serif;
    font-size:1.6rem;
    font-weight:500;
    letter-spacing:.3px;
    text-shadow:0 2px 10px rgba(0,0,0,.35);
  }
  header.hero .sub{
    margin-top:8px;
    font-size:.85rem;
    color:rgba(255,255,255,.9);
    text-shadow:0 1px 6px rgba(0,0,0,.35);
  }
  .goal-badges{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-top:16px;
    flex-wrap:wrap;
  }
  .goal-badges span{
    background:rgba(255,255,255,.92);
    color:var(--sea-900);
    font-weight:700;
    padding:6px 14px;
    border-radius:999px;
    font-size:.85rem;
    box-shadow:0 2px 8px rgba(0,40,60,.18);
  }
  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:0 16px;
  }
  .dates{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:18px;
    font-size:.8rem;
    color:rgba(255,255,255,.9);
    flex-wrap:wrap;
  }
  .dates span{
    background:rgba(0,0,0,.18);
    padding:4px 10px;
    border-radius:8px;
  }

  /* Tabs */
  .tabbar{
    position:sticky;
    top:0;
    z-index:20;
    background:#fff;
    border-bottom:1px solid var(--line);
    display:flex;
    gap:6px;
    padding:10px 16px;
    max-width:720px;
    margin:0 auto;
    overflow-x:auto;
  }
  .tabbar button{
    flex:1;
    min-width:110px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--muted);
    padding:10px 8px;
    border-radius:10px;
    font-size:.85rem;
    font-weight:600;
    cursor:pointer;
    line-height:1.3;
  }
  .tabbar button .em{
    display:block;
    font-size:.72rem;
    font-weight:400;
    margin-top:2px;
    opacity:.8;
  }
  .tabbar button.active{
    background:var(--sea-500);
    border-color:var(--sea-500);
    color:#fff;
  }

  section.country{
    display:none;
    padding-top:18px;
  }
  section.country.active{
    display:block;
  }

  .country-summary{
    background:var(--sea-100);
    border:1px solid #cfe6f3;
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:18px;
    font-size:.88rem;
    color:var(--sea-900);
  }

  h3.section-title{
    font-size:1rem;
    margin:22px 0 12px;
    padding-left:10px;
    border-left:4px solid var(--sea-500);
  }
  h3.section-title:first-of-type{ margin-top:0; }

  .flight-list{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .flight-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:0 1px 3px rgba(10,37,64,.06);
  }
  .flight-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 16px;
    background:var(--sea-900);
    color:#fff;
  }
  .flight-head .airline{
    font-weight:600;
    font-size:.95rem;
  }
  .flight-head .price{
    font-family:'GmarketSans','Pretendard',sans-serif;
    font-weight:700;
    font-size:1.02rem;
  }
  .flight-body{
    padding:10px 16px 14px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .flight-time{
    font-size:.85rem;
    color:var(--ink);
    padding:6px 0;
    border-bottom:1px dashed var(--line);
  }
  .flight-time:last-child{ border-bottom:none; }
  .flight-option + .flight-option{
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--line);
  }
  .opt-label{
    font-size:.72rem;
    font-weight:700;
    color:var(--sea-500);
    margin-bottom:4px;
  }
  .dir{
    display:inline-block;
    font-size:.68rem;
    font-weight:700;
    padding:2px 6px;
    border-radius:6px;
    margin-right:6px;
    vertical-align:middle;
  }
  .dir-out{ background:var(--accent-bg); color:var(--ok); }
  .dir-ret{ background:#eaf1fb; color:var(--sea-500); }
  .flight-time a{
    color:var(--sea-500);
    font-weight:600;
    text-decoration:none;
  }
  .flight-time a:hover{ text-decoration:underline; }

  .feature-box{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    box-shadow:0 1px 3px rgba(10,37,64,.06);
  }
  .feature-tagline{
    font-family:'GmarketSans','Pretendard',sans-serif;
    font-size:.92rem;
    color:var(--sea-700);
    background:var(--sea-100);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:14px;
    text-align:center;
  }
  .feature-stats{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-bottom:16px;
  }
  .feature-stat{
    display:flex;
    gap:8px;
    font-size:.82rem;
  }
  .feature-stat .f-label{
    flex:0 0 82px;
    font-weight:700;
    color:var(--sea-500);
  }
  .feature-stat .f-value{ color:var(--ink); }
  .feature-heading{
    font-size:.85rem;
    font-weight:700;
    margin-bottom:6px;
  }
  .feature-heading.pros{ color:var(--ok); }
  .feature-heading.cons{ color:var(--fail); }
  .feature-box ul{
    margin:0 0 14px;
    padding-left:18px;
    font-size:.82rem;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    gap:5px;
  }
  .feature-box .feature-cons ul{ margin-bottom:0; }

  .placeholder-box{
    border:1px dashed #cbd8e0;
    border-radius:var(--radius);
    padding:20px 16px;
    text-align:center;
    color:var(--muted);
    font-size:.85rem;
    background:#f8fafb;
  }

  .compare-scroll{
    overflow-x:auto;
    border:1px solid var(--line);
    border-radius:12px;
    background:#fff;
  }
  table.compare{
    width:100%;
    border-collapse:collapse;
    font-size:.82rem;
    white-space:nowrap;
  }
  table.compare th{
    background:var(--sea-100);
    color:var(--sea-900);
    font-weight:700;
    text-align:left;
    padding:10px 12px;
    border-bottom:1px solid var(--line);
  }
  table.compare td{
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    color:var(--ink);
  }
  table.compare tr:last-child td{border-bottom:none;}
  table.compare td.name{font-weight:700;color:var(--sea-700);}
  table.compare td.price{color:var(--accent);font-weight:700;}
  table.compare td.wrap-cell{ white-space:normal; max-width:150px; }
  .star-rating{ font-size:.95rem; letter-spacing:1px; }
  .star-fill{ color:#f2994a; }
  .star-empty{ color:#dbe3e9; }
  td.flight-time-cell{ white-space:normal; }
  td.flight-time-cell details summary{
    cursor:pointer;
    color:var(--sea-500);
    font-weight:600;
    list-style:none;
  }
  td.flight-time-cell details summary::-webkit-details-marker{ display:none; }
  td.flight-time-cell details summary::after{
    content:' ▸ 상세';
    font-size:.72rem;
    color:var(--muted);
    font-weight:400;
  }
  td.flight-time-cell details[open] summary::after{ content:' ▾ 접기'; }
  td.flight-time-cell .ft-detail{
    margin-top:6px;
    padding-top:6px;
    border-top:1px dashed var(--line);
    font-size:.78rem;
    color:var(--ink);
    min-width:180px;
  }
  td.flight-time-cell .ft-row{
    padding:4px 0;
  }
  td.flight-time-cell .ft-row + .ft-row{
    margin-top:4px;
    border-top:1px dashed var(--line);
  }
  .compare-note{
    font-size:.76rem;
    color:var(--muted);
    margin-top:8px;
  }

  footer{
    text-align:center;
    font-size:.75rem;
    color:var(--muted);
    margin-top:40px;
  }
</style>
</head>

</div>

};

function stars(n){
  return `<span class="star-rating" title="${n}/5"><span class="star-fill">${"★".repeat(n)}</span><span class="star-empty">${"★".repeat(5 - n)}</span></span>`;
}

function minPrice(flights){
  const nums = flights.map(f => parseInt((f.price.match(/\d+/) || [null])[0], 10)).filter(n => !isNaN(n));
  return nums.length ? Math.min(...nums) : null;
}

const sectionsWrap = document.getElementById("country-sections");
const compareBody = document.getElementById("compare-body");

Object.entries(COUNTRIES).forEach(([key, c], i) => {
  const lowest = minPrice(c.flights);

  // 국가별 상세 섹션
  const section = document.createElement("section");
  section.className = "country";
  section.id = "country-" + key;

  const flightCards = c.flights.map(f => `
    <div class="flight-card">
      <div class="flight-head">
        <span class="airline">${f.airline}</span>
        <span class="price">${f.price}</span>
      </div>
      <div class="flight-body">
        ${f.options.map((o, oi) => `
          <div class="flight-option">
            ${f.options.length > 1 ? `<div class="opt-label">옵션 ${oi + 1}</div>` : ""}
            <div class="flight-time"><span class="dir dir-out">가는편</span> 인천(ICN) → ${c.airport} &nbsp; ${o.out}</div>
            <div class="flight-time"><span class="dir dir-ret">오는편</span> ${c.airport} → 인천(ICN) &nbsp; ${o.ret}</div>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");

  const stayHtml = c.stays.length
    ? c.stays.map(s => `
        <div class="flight-card">
          <div class="flight-head"><span class="airline">${s.name}</span><span class="price">${s.price || ""}</span></div>
          <div class="flight-body">
            ${s.note ? `<div class="flight-time">${s.note}</div>` : ""}
            ${s.link ? `<div class="flight-time"><a href="${s.link}" target="_blank" rel="noopener">🔗 ${s.linkLabel || "링크 보기"}</a></div>` : ""}
          </div>
        </div>
      `).join("")
    : `<div class="placeholder-box">🏨 ${c.label} 숙소 정보는 아직 준비 중이에요. 정리되면 여기에 추가할게요.</div>`;

  const featureHtml = `
    <div class="feature-box">
      <div class="feature-tagline">${c.features.tagline}</div>
      <div class="feature-stats">
        <div class="feature-stat"><span class="f-label">바다시야</span><span class="f-value">${c.features.sea}</span></div>
        <div class="feature-stat"><span class="f-label">리조트 퀄리티</span><span class="f-value">${c.features.resort}</span></div>
        <div class="feature-stat"><span class="f-label">핵심매력</span><span class="f-value">${c.features.appeal}</span></div>
      </div>
      <div class="feature-pros">
        <div class="feature-heading pros">👍 장점</div>
        <ul>${c.features.pros.map(p => `<li>${p}</li>`).join("")}</ul>
      </div>
      <div class="feature-cons">
        <div class="feature-heading cons">👎 단점</div>
        <ul>${c.features.cons.map(p => `<li>${p}</li>`).join("")}</ul>
      </div>
    </div>
  `;

  section.innerHTML = `
    <div class="country-summary">${c.flag} <b>${c.label} (${c.country})</b> · ${c.flightNote} · 항공권 최저 ${lowest}만원부터</div>
    <h3 class="section-title">🌴 여행지 특징</h3>
    ${featureHtml}
    <h3 class="section-title">✈️ 항공권</h3>
    <div class="flight-list">${flightCards}</div>
    <h3 class="section-title">🏨 숙소</h3>
    ${c.stayRefNote ? `<p class="compare-note" style="margin:0 0 10px">📎 ${c.stayRefNote.text} · <a href="${c.stayRefNote.link}" target="_blank" rel="noopener">블로그 보기</a></p>` : ""}
    <div class="flight-list">${stayHtml}</div>
  `;
  sectionsWrap.appendChild(section);

  // 비교표 행
  const flightTimeDetail = c.flights.map(f => `
    <div class="ft-row"><b>${f.airline}</b> ${f.price}<br>${f.options.map((o, oi) =>
      (f.options.length > 1 ? `[옵션${oi + 1}] ` : "") +
      `가는 인천→${c.airport} ${o.out}<br>오는 ${c.airport}→인천 ${o.ret}`
    ).join("<br>")}</div>
  `).join("");

  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td class="name">${c.flag} ${c.label}</td>
    <td>${stars(c.features.seaLevel)}</td>
    <td>${stars(c.features.resortLevel)}</td>
    <td class="price">${lowest}만원~</td>
    <td class="flight-time-cell">
      <details>
        <summary>${c.flightNote}</summary>
        <div class="ft-detail">${flightTimeDetail}</div>
      </details>
    </td>
    <td>${c.stays.length ? "정리됨" : "준비 중"}</td>
  `;
  compareBody.appendChild(tr);
});

// 탭 전환
document.getElementById("tabbar").addEventListener("click", e => {
  const btn = e.target.closest(".country-btn");
  if (!btn) return;
  document.querySelectorAll(".country-btn").forEach(b => b.classList.toggle("active", b === btn));
  document.querySelectorAll("section.country").forEach(s => s.classList.toggle("active", s.id === "country-" + btn.dataset.country));
});
</script>

</body>
</html>
