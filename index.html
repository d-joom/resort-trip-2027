<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2027 상반기 휴양지 여행 비교</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  @font-face{
    font-family:'GmarketSans';
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
    font-weight:500;
    font-style:normal;
  }
  @font-face{
    font-family:'GmarketSans';
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
    font-weight:700;
    font-style:normal;
  }
  :root{
    --sea-900:#013049;
    --sea-700:#00577d;
    --sea-500:#0f7fa8;
    --sea-300:#5db6cf;
    --sea-100:#e6f2f5;
    --sand:#f7f1e3;
    --accent:#00c189;
    --accent-bg:#e1faf1;
    --ok:#00a274;
    --ok-bg:#e1faf1;
    --fail:#c94b4b;
    --fail-bg:#fbeaea;
    --ink:#1b2a37;
    --muted:#6b7c8c;
    --card:#ffffff;
    --line:#e1e9ef;
    --radius:14px;
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:linear-gradient(180deg,var(--sea-100) 0%, #fff 320px);
    color:var(--ink);
    line-height:1.5;
    padding-bottom:60px;
  }
  header.hero{
    position:relative;
    overflow:hidden;
    background:
      linear-gradient(180deg, rgba(1,48,73,.18) 0%, rgba(1,48,73,.45) 100%),
      url('img/main.jpg') center 45%/cover no-repeat;
    color:#fff;
    padding:44px 20px 32px;
    text-align:center;
    min-height:220px;
  }
  header.hero h1{
    margin:0;
    font-family:'GmarketSans','Pretendard',sans-serif;
    font-size:1.6rem;
    font-weight:500;
    letter-spacing:.3px;
    text-shadow:0 2px 10px rgba(0,0,0,.35);
  }
  header.hero .sub{
    margin-top:8px;
    font-size:.85rem;
    color:rgba(255,255,255,.9);
    text-shadow:0 1px 6px rgba(0,0,0,.35);
  }
  .goal-badges{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-top:16px;
    flex-wrap:wrap;
  }
  .goal-badges span{
    background:rgba(255,255,255,.92);
    color:var(--sea-900);
    font-weight:700;
    padding:6px 14px;
    border-radius:999px;
    font-size:.85rem;
    box-shadow:0 2px 8px rgba(0,40,60,.18);
  }
  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:0 16px;
  }
  .dates{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:18px;
    font-size:.8rem;
    color:rgba(255,255,255,.9);
    flex-wrap:wrap;
  }
  .dates span{
    background:rgba(0,0,0,.18);
    padding:4px 10px;
    border-radius:8px;
  }

  /* Tabs */
  .tabbar{
    position:sticky;
    top:0;
    z-index:20;
    background:#fff;
    border-bottom:1px solid var(--line);
    display:flex;
    gap:6px;
    padding:10px 16px;
    max-width:720px;
    margin:0 auto;
    overflow-x:auto;
  }
  .tabbar button{
    flex:1;
    min-width:110px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--muted);
    padding:10px 8px;
    border-radius:10px;
    font-size:.85rem;
    font-weight:600;
    cursor:pointer;
    line-height:1.3;
  }
  .tabbar button .em{
    display:block;
    font-size:.72rem;
    font-weight:400;
    margin-top:2px;
    opacity:.8;
  }
  .tabbar button.active{
    background:var(--sea-500);
    border-color:var(--sea-500);
    color:#fff;
  }

  section.country{
    display:none;
    padding-top:18px;
  }
  section.country.active{
    display:block;
  }

  .country-summary{
    background:var(--sea-100);
    border:1px solid #cfe6f3;
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:18px;
    font-size:.88rem;
    color:var(--sea-900);
  }

  h3.section-title{
    font-size:1rem;
    margin:22px 0 12px;
    padding-left:10px;
    border-left:4px solid var(--sea-500);
  }
  h3.section-title:first-of-type{ margin-top:0; }

  .flight-list{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .flight-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:0 1px 3px rgba(10,37,64,.06);
  }
  .flight-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 16px;
    background:var(--sea-900);
    color:#fff;
  }
  .flight-head .airline{
    font-weight:600;
    font-size:.95rem;
  }
  .flight-head .price{
    font-family:'GmarketSans','Pretendard',sans-serif;
    font-weight:700;
    font-size:1.02rem;
  }
  .flight-body{
    padding:10px 16px 14px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .flight-time{
    font-size:.85rem;
    color:var(--ink);
    padding:6px 0;
    border-bottom:1px dashed var(--line);
  }
  .flight-time:last-child{ border-bottom:none; }
  .dir{
    display:inline-block;
    font-size:.68rem;
    font-weight:700;
    padding:2px 6px;
    border-radius:6px;
    margin-right:6px;
    vertical-align:middle;
  }
  .dir-out{ background:var(--accent-bg); color:var(--ok); }
  .dir-ret{ background:#eaf1fb; color:var(--sea-500); }
  .area-tag{
    display:inline-block;
    font-size:.68rem;
    font-weight:700;
    padding:2px 7px;
    border-radius:6px;
    background:rgba(255,255,255,.2);
    margin-right:4px;
    vertical-align:middle;
  }
  .highlight-note{ color:var(--accent) !important; font-weight:600; }
  .room-row{
    display:flex;
    gap:10px;
    align-items:flex-start;
    padding:8px 0;
    border-bottom:1px dashed var(--line);
  }
  .room-row:last-child{ border-bottom:none; }
  .room-info{ flex:1; min-width:0; }
  .room-info .room-name{ font-weight:700; font-size:.88rem; }
  .room-info .room-detail{ font-size:.8rem; color:var(--muted); margin-top:3px; }
  .room-photos{ flex:0 0 120px; width:120px; }
  .room-photos .thumb-slider{ border-radius:8px; }
  .stay-features{
    margin-top:8px;
    padding:8px 10px;
    background:var(--sea-100);
    border-radius:8px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .stay-feature-item{
    font-size:.78rem;
    color:var(--sea-900);
  }
  .option-slider .track{
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    -ms-overflow-style:none;
  }
  .option-slider .track::-webkit-scrollbar{ display:none; height:0; }
  .option-slider .option-slide{
    flex:0 0 100%;
    scroll-snap-align:center;
    box-sizing:border-box;
  }
  .option-nav{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin-top:6px;
  }
  .opt-arrow{
    width:26px;
    height:26px;
    border:1px solid var(--line);
    border-radius:50%;
    background:#fff;
    color:var(--sea-500);
    font-size:.95rem;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .opt-arrow:hover{ background:var(--sea-100); }
  .opt-arrow:disabled{ opacity:.3; cursor:default; background:#fff; }
  .opt-count{
    font-size:.75rem;
    color:var(--muted);
    font-weight:600;
    min-width:30px;
    text-align:center;
  }
  .flight-time a{
    color:var(--sea-500);
    font-weight:600;
    text-decoration:none;
  }
  .flight-time a:hover{ text-decoration:underline; }

  .feature-box{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    box-shadow:0 1px 3px rgba(10,37,64,.06);
  }
  .feature-tagline{
    font-family:'GmarketSans','Pretendard',sans-serif;
    font-size:.92rem;
    color:var(--sea-700);
    background:var(--sea-100);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:14px;
    text-align:center;
  }
  .feature-stats{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-bottom:16px;
  }
  .feature-stat{
    display:flex;
    gap:8px;
    font-size:.82rem;
  }
  .feature-stat .f-label{
    flex:0 0 82px;
    font-weight:700;
    color:var(--sea-500);
  }
  .feature-stat .f-value{ color:var(--ink); }
  .feature-heading{
    font-size:.85rem;
    font-weight:700;
    margin-bottom:6px;
  }
  .feature-heading.pros{ color:var(--ok); }
  .feature-heading.cons{ color:var(--fail); }
  .feature-box ul{
    margin:0 0 14px;
    padding-left:18px;
    font-size:.82rem;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    gap:5px;
  }
  .feature-box .feature-cons ul{ margin-bottom:0; }

  .placeholder-box{
    border:1px dashed #cbd8e0;
    border-radius:var(--radius);
    padding:20px 16px;
    text-align:center;
    color:var(--muted);
    font-size:.85rem;
    background:#f8fafb;
  }

  .photo-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  @media(min-width:560px){
    .photo-grid{grid-template-columns:1fr 1fr 1fr;}
  }
  .photo-card{
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
    background:#fff;
  }
  .photo-card .photo-info{ padding:8px 10px 10px; }
  .photo-card .photo-name{ font-weight:700; font-size:.85rem; }
  .photo-card .photo-desc{ font-size:.72rem; color:var(--muted); margin-top:2px; }

  /* 인라인 사진 슬라이더 (여행 사진 그리드 / 숙소 카드 공용) */
  .thumb-slider{
    position:relative;
    background:#dde7ee;
    overflow:hidden;
  }
  .thumb-slider .track{
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    -ms-overflow-style:none;
  }
  .thumb-slider .track::-webkit-scrollbar{ display:none; height:0; }
  .thumb-slider .track img{
    flex:0 0 100%;
    scroll-snap-align:center;
    width:100%;
    height:130px;
    object-fit:cover;
    display:block;
    cursor:zoom-in;
  }
  .thumb-slider.tall .track img{ height:400px; }
  .thumb-slider[data-stay="henannAlona"] .track img{ height:520px; }
  .thumb-slider.small{ border-radius:8px; }
  .thumb-slider.small .track img{ height:100px; }
  .thumb-slider .arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:30px;
    height:30px;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,.45);
    color:#fff;
    font-size:1rem;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .thumb-slider .arrow:hover{ background:rgba(0,0,0,.65); }
  .thumb-slider .arrow.prev{ left:6px; }
  .thumb-slider .arrow.next{ right:6px; }
  .thumb-slider .dots{
    position:absolute;
    bottom:8px;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    gap:5px;
  }
  .thumb-slider .dots span{
    width:6px;
    height:6px;
    border-radius:50%;
    background:rgba(255,255,255,.55);
  }
  .thumb-slider .dots span.on{ background:#fff; }
  .thumb-slider .count{
    position:absolute;
    top:8px;
    right:8px;
    background:rgba(0,0,0,.5);
    color:#fff;
    font-size:.68rem;
    padding:2px 7px;
    border-radius:999px;
  }

  .lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    z-index:1000;
    align-items:center;
    justify-content:center;
  }
  .lightbox.open{display:flex;}
  .lightbox img{
    max-width:92vw;
    max-height:82vh;
    object-fit:contain;
  }
  .lightbox .lb-close{
    position:absolute;
    top:16px;
    right:16px;
    width:38px;
    height:38px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    color:#fff;
    font-size:1.2rem;
    cursor:pointer;
  }
  .lightbox .lb-arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:46px;
    height:46px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    color:#fff;
    font-size:1.6rem;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .lightbox .lb-arrow:hover,
  .lightbox .lb-close:hover{background:rgba(255,255,255,.24);}
  .lightbox .lb-arrow.prev{left:12px;}
  .lightbox .lb-arrow.next{right:12px;}
  .lightbox .lb-count{
    position:absolute;
    bottom:20px;
    left:0;
    right:0;
    text-align:center;
    color:#fff;
    font-size:.85rem;
    opacity:.85;
  }

  .compare-scroll{
    overflow-x:auto;
    border:1px solid var(--line);
    border-radius:12px;
    background:#fff;
  }
  table.compare{
    width:100%;
    border-collapse:collapse;
    font-size:.82rem;
    white-space:nowrap;
  }
  table.compare th{
    background:var(--sea-100);
    color:var(--sea-900);
    font-weight:700;
    text-align:left;
    padding:10px 12px;
    border-bottom:1px solid var(--line);
  }
  table.compare td{
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    color:var(--ink);
  }
  table.compare tr:last-child td{border-bottom:none;}
  table.compare td.name{font-weight:700;color:var(--sea-700);}
  table.compare td.price{color:var(--accent);font-weight:700;}
  table.compare td.wrap-cell{ white-space:normal; max-width:150px; }
  .star-rating{ font-size:.95rem; letter-spacing:1px; }
  .star-fill{ color:#f2994a; }
  .star-empty{ color:#dbe3e9; }
  td.flight-time-cell{ white-space:normal; }
  td.flight-time-cell details summary{
    cursor:pointer;
    color:var(--sea-500);
    font-weight:600;
    list-style:none;
  }
  td.flight-time-cell details summary::-webkit-details-marker{ display:none; }
  td.flight-time-cell details summary::after{
    content:' ▸ 상세';
    font-size:.72rem;
    color:var(--muted);
    font-weight:400;
  }
  td.flight-time-cell details[open] summary::after{ content:' ▾ 접기'; }
  td.flight-time-cell .ft-detail{
    margin-top:6px;
    padding-top:6px;
    border-top:1px dashed var(--line);
    font-size:.78rem;
    color:var(--ink);
    min-width:180px;
  }
  td.flight-time-cell .ft-row{
    padding:4px 0;
  }
  td.flight-time-cell .ft-row + .ft-row{
    margin-top:4px;
    border-top:1px dashed var(--line);
  }
  .compare-note{
    font-size:.76rem;
    color:var(--muted);
    margin-top:8px;
  }

  footer{
    text-align:center;
    font-size:.75rem;
    color:var(--muted);
    margin-top:40px;
  }
</style>
</head>
<body>

<header class="hero">
  <h1>🏖️ 2027 상반기 휴양지 여행 비교</h1>
  <div class="sub">아직 나라 미정 · 후보지 비교 중</div>
  <div class="dates">
    <span>2/24(수) 출발</span>
    <span>2/28(일) 복귀 (예정)</span>
  </div>
  <div class="goal-badges"><span>👩‍👩‍👧 여행인원 3명</span></div>
</header>

<nav class="tabbar" id="tabbar">
  <!-- 전체 비교 탭: 내용 정리 후 다시 노출 예정
  <button class="country-btn" data-country="all">📊 전체 비교<span class="em">한눈에 보기</span></button>
  -->
  <button class="country-btn active" data-country="phuket">🇹🇭 푸켓<span class="em">태국</span></button>
  <button class="country-btn" data-country="bohol">🇵🇭 보홀<span class="em">필리핀</span></button>
  <button class="country-btn" data-country="phuquoc">🇻🇳 푸꾸옥<span class="em">베트남</span></button>
</nav>

<div class="wrap">

  <div id="country-sections"></div>

  <!-- 국가별 한눈에 비교 (탭에서 숨김 처리됨, 아래 section은 유지) -->
  <section class="country" id="country-all">
    <h3 class="section-title">📊 국가별 한눈에 비교</h3>
    <div class="compare-scroll">
      <table class="compare">
        <thead>
          <tr>
            <th>여행지</th>
            <th>바다시야</th>
            <th>리조트</th>
            <th>최저 항공가</th>
            <th>비행시간</th>
            <th>숙소</th>
          </tr>
        </thead>
        <tbody id="compare-body"></tbody>
      </table>
    </div>
    <p class="compare-note">항공권은 네이버 항공권 26/07/21 기준 · 숙소는 구글 예약 기준 시세입니다.</p>
  </section>

</div>

<footer>2027 상반기 휴양지 여행 비교 · 개인용 자료</footer>

<div class="lightbox" id="lightbox">
  <button class="lb-close" type="button" aria-label="닫기">✕</button>
  <button class="lb-arrow prev" type="button" aria-label="이전 사진">‹</button>
  <img id="lightbox-img" src="" alt="">
  <button class="lb-arrow next" type="button" aria-label="다음 사진">›</button>
  <div class="lb-count" id="lightbox-count"></div>
</div>

<script>
// 국가별 데이터 (항공권/숙소, 나중에 숙소 항목만 채우면 됨)
const COUNTRIES = {
  phuket: {
    label: "푸켓", flag: "🇹🇭", country: "태국", airport: "푸켓(HKT)",
    flightNote: "직항 약 6시간대",
    flights: [
      { airline: "대한항공", price: "100만원", options: [
        { out: "17:25 → 22:10 · 6시간 45분", ret: "23:40 → 07:35 · 5시간 55분" },
      ] },
      { airline: "아시아나", price: "100만원대", options: [
        { out: "17:00 → 21:35 · 6시간 35분", ret: "22:55 → 07:10 · 6시간 15분" },
      ] },
    ],
    features: {
      tagline: "“실패 없는 정석 휴양지 - 예쁜 리조트, 다채로운 일상”",
      sea: "보통~상 (피피섬 나가면 최상)", seaLevel: 3,
      resort: "최상 (5성급, 인피니티풀 많음)", resortLevel: 5,
      appeal: "휴양 + 인프라 + 유흥 + 섬투어",
      pros: [
        "리조트 천국: 인생샷 건지기 좋은 화려한 인피니티풀과 최고급 서비스를 갖춘 5성급 리조트가 넘쳐남",

    { name: "야시장", desc: "빠통비치 근처 야시장 & 먹거리", images: ["푸켓/야시장_01.png", "푸켓/야시장_02.jpg", "푸켓/야시장_03.jpg", "푸켓/야시장_04.jpg", "푸켓/야시장_05.jpg"] },
  ],

  ],
  phuquoc: [],
};

function stars(n){
  return `<span class="star-rating" title="${n}/5"><span class="star-fill">${"★".repeat(n)}</span><span class="star-empty">${"★".repeat(5 - n)}</span></span>`;
}

function minPrice(flights){
  const nums = flights.map(f => parseInt((f.price.match(/\d+/) || [null])[0], 10)).filter(n => !isNaN(n));
  return nums.length ? Math.min(...nums) : null;
}

const sectionsWrap = document.getElementById("country-sections");
const compareBody = document.getElementById("compare-body");

// 룸타입별 사진 슬라이더는 렌더링 시점에 id만 발급하고, 전체 렌더 후 일괄 초기화
const roomSliderRegistry = [];
function roomSliderHtml(photos){
  if (!photos || !photos.length) return "";
  const id = `room-slider-${roomSliderRegistry.length}`;
  roomSliderRegistry.push({ id, photos });
  return `<div class="thumb-slider small" id="${id}"></div>`;
}

Object.entries(COUNTRIES).forEach(([key, c], i) => {
  const lowest = minPrice(c.flights);

  // 국가별 상세 섹션
  const section = document.createElement("section");
  section.className = "country" + (i === 0 ? " active" : "");
  section.id = "country-" + key;

  const renderOption = o => `
    <div class="flight-option">
      <div class="flight-time"><span class="dir dir-out">가는편</span> 인천(ICN) → ${c.airport} &nbsp; ${o.out}</div>
      <div class="flight-time"><span class="dir dir-ret">오는편</span> ${c.airport} → 인천(ICN) &nbsp; ${o.ret}</div>
    </div>
  `;

  const flightCards = c.flights.map((f, fi) => {
    const optionsHtml = f.options.length > 1 ? `
      <div class="option-slider" id="opt-${key}-${fi}">
        <div class="track">
          ${f.options.map(o => `<div class="option-slide">${renderOption(o)}</div>`).join("")}
        </div>
        <div class="option-nav">
          <button class="opt-arrow prev" type="button" aria-label="이전 옵션">‹</button>
          <span class="opt-count">1/${f.options.length}</span>
          <button class="opt-arrow next" type="button" aria-label="다음 옵션">›</button>
        </div>
      </div>
    ` : renderOption(f.options[0]);
    return `
    <div class="flight-card">
      <div class="flight-head">
        <span class="airline">${f.airline}</span>
        <span class="price">${f.price}</span>
      </div>
      <div class="flight-body">
        ${optionsHtml}
      </div>
    </div>
  `;
  }).join("");

  const stayHtml = c.stays.length
    ? c.stays.map(s => {
        const stayPhotos = s.photoKey ? STAY_PHOTOS[s.photoKey] : null;
        const links = s.links || (s.link ? [{ url: s.link, label: s.linkLabel || "링크 보기" }] : []);
        return `
        <div class="flight-card">
          <div class="flight-head">
            <span class="airline">${s.area ? `<span class="area-tag">${s.area}</span> ` : ""}${s.name}</span>
            <span class="price">${s.price || ""}</span>
          </div>
          ${stayPhotos && stayPhotos.length ? `<div class="thumb-slider tall" data-stay="${s.photoKey}"></div>` : ""}
          <div class="flight-body">
            ${s.highlight ? `<div class="flight-time highlight-note">${s.highlight}</div>` : ""}
            ${s.note ? `<div class="flight-time">${s.note}</div>` : ""}
            ${(s.rooms || []).map(r => `
              <div class="room-row">
                <div class="room-info">
                  <div class="room-name">${r.name}</div>
                  ${r.detail ? `<div class="room-detail">${r.detail}</div>` : ""}
                </div>
                ${r.photos && r.photos.length ? `<div class="room-photos">${roomSliderHtml(r.photos)}</div>` : ""}
              </div>
            `).join("")}
            ${(s.features || []).length ? `
              <div class="stay-features">
                ${s.features.map(f => `<div class="stay-feature-item">✓ ${f}</div>`).join("")}
              </div>
            ` : ""}
            ${links.map(l => `<div class="flight-time"><a href="${l.url}" target="_blank" rel="noopener">🔗 ${l.label}</a></div>`).join("")}
          </div>
        </div>
      `;
      }).join("")
    : `<div class="placeholder-box">🏨 ${c.label} 숙소 정보는 아직 준비 중이에요. 정리되면 여기에 추가할게요.</div>`;

  const stayAreaHtml = c.stayAreaNote ? `
    <div class="country-summary" style="margin-bottom:12px">
      <b>📍 숙소 지역 참고</b><br>
      ${c.stayAreaNote.map(a => `<div style="margin-top:6px"><b>${a.area}</b> - ${a.desc}</div>`).join("")}
    </div>
  ` : "";

  const featureHtml = `
    <div class="feature-box">
      <div class="feature-tagline">${c.features.tagline}</div>
      <div class="feature-stats">
        <div class="feature-stat"><span class="f-label">바다시야</span><span class="f-value">${c.features.sea}</span></div>
        <div class="feature-stat"><span class="f-label">리조트 퀄리티</span><span class="f-value">${c.features.resort}</span></div>
        <div class="feature-stat"><span class="f-label">핵심매력</span><span class="f-value">${c.features.appeal}</span></div>
      </div>
      <div class="feature-pros">
        <div class="feature-heading pros">👍 장점</div>
        <ul>${c.features.pros.map(p => `<li>${p}</li>`).join("")}</ul>
      </div>
      <div class="feature-cons">
        <div class="feature-heading cons">👎 단점</div>
        <ul>${c.features.cons.map(p => `<li>${p}</li>`).join("")}</ul>
      </div>
    </div>
  `;

  const photoGroups = PHOTOS[key] || [];
  const photoHtml = photoGroups.length ? `
    <h3 class="section-title">📸 여행 사진</h3>
    <div class="photo-grid">
      ${photoGroups.map((g, gi) => `
        <div class="photo-card">
          <div class="thumb-slider" data-key="${key}" data-group="${gi}"></div>
          <div class="photo-info">
            <div class="photo-name">${g.name}</div>
            <div class="photo-desc">${g.desc}</div>
          </div>
        </div>
      `).join("")}
    </div>
  ` : "";

  section.innerHTML = `
    <div class="country-summary">${c.flag} <b>${c.label} (${c.country})</b> · ${c.flightNote} · 항공권 최저 ${lowest}만원부터</div>
    <h3 class="section-title">🌴 여행지 특징</h3>
    ${featureHtml}
    ${photoHtml}
    <h3 class="section-title">✈️ 항공권</h3>
    <div class="flight-list">${flightCards}</div>
    <h3 class="section-title">🏨 숙소</h3>
    ${stayAreaHtml}
    ${c.stayRefNote ? `<p class="compare-note" style="margin:0 0 10px">📎 ${c.stayRefNote.text} · <a href="${c.stayRefNote.link}" target="_blank" rel="noopener">블로그 보기</a></p>` : ""}
    <div class="flight-list">${stayHtml}</div>
  `;
  sectionsWrap.appendChild(section);

  // 비교표 행
  const flightTimeDetail = c.flights.map(f => `
    <div class="ft-row"><b>${f.airline}</b> ${f.price}<br>${f.options.map((o, oi) =>
      (f.options.length > 1 ? `[옵션${oi + 1}] ` : "") +
      `가는 인천→${c.airport} ${o.out}<br>오는 ${c.airport}→인천 ${o.ret}`
    ).join("<br>")}</div>
  `).join("");

  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td class="name">${c.flag} ${c.label}</td>
    <td>${stars(c.features.seaLevel)}</td>
    <td>${stars(c.features.resortLevel)}</td>
    <td class="price">${lowest}만원~</td>
    <td class="flight-time-cell">
      <details>
        <summary>${c.flightNote}</summary>
        <div class="ft-detail">${flightTimeDetail}</div>
      </details>
    </td>
    <td>${c.stays.length ? "정리됨" : "준비 중"}</td>
  `;
  compareBody.appendChild(tr);
});

// 탭 전환
document.getElementById("tabbar").addEventListener("click", e => {
  const btn = e.target.closest(".country-btn");
  if (!btn) return;
  document.querySelectorAll(".country-btn").forEach(b => b.classList.toggle("active", b === btn));
  document.querySelectorAll("section.country").forEach(s => s.classList.toggle("active", s.id === "country-" + btn.dataset.country));
});

// 항공권 옵션 슬라이더 초기화 (옵션 여러 개인 경우 좌우로 넘겨보기)
function initOptionSlider(container){
  const track = container.querySelector(".track");
  const prevBtn = container.querySelector(".opt-arrow.prev");
  const nextBtn = container.querySelector(".opt-arrow.next");
  const countEl = container.querySelector(".opt-count");
  const total = track.children.length;

  const currentIndex = () => Math.round(track.scrollLeft / track.clientWidth);
  const goTo = idx => {
    idx = Math.max(0, Math.min(total - 1, idx));
    track.scrollTo({ left: idx * track.clientWidth, behavior: "smooth" });
  };

  prevBtn.addEventListener("click", () => goTo(currentIndex() - 1));
  nextBtn.addEventListener("click", () => goTo(currentIndex() + 1));

  track.addEventListener("scroll", () => {
    const idx = currentIndex();
    countEl.textContent = (idx + 1) + "/" + total;
    prevBtn.disabled = idx === 0;
    nextBtn.disabled = idx === total - 1;
  });
  prevBtn.disabled = true;
  nextBtn.disabled = total <= 1;
}
document.querySelectorAll(".option-slider").forEach(initOptionSlider);

// 인라인 사진 슬라이더 초기화 (클릭하면 라이트박스로 확대)
function buildSlider(container, images){
  if (!images || images.length === 0) { container.style.display = "none"; return; }
  const track = document.createElement("div");
  track.className = "track";
  images.forEach((src, i) => {
    const img = document.createElement("img");
    img.src = "img/" + src;
    img.loading = "lazy";
    img.alt = "";
    img.addEventListener("click", () => openLightbox(images, i));
    track.appendChild(img);
  });
  container.appendChild(track);

  if (images.length > 1) {
    const dots = document.createElement("div");
    dots.className = "dots";
    images.forEach((_, i) => {
      const d = document.createElement("span");
      if (i === 0) d.className = "on";
      dots.appendChild(d);
    });
    container.appendChild(dots);

    const count = document.createElement("div");
    count.className = "count";
    count.textContent = "1/" + images.length;
    container.appendChild(count);

    const prevBtn = document.createElement("button");
    prevBtn.className = "arrow prev";
    prevBtn.type = "button";
    prevBtn.setAttribute("aria-label", "이전 사진");
    prevBtn.textContent = "‹";
    container.appendChild(prevBtn);

    const nextBtn = document.createElement("button");
    nextBtn.className = "arrow next";
    nextBtn.type = "button";
    nextBtn.setAttribute("aria-label", "다음 사진");
    nextBtn.textContent = "›";
    container.appendChild(nextBtn);

    const goTo = idx => {
      idx = Math.max(0, Math.min(images.length - 1, idx));
      track.scrollTo({ left: idx * track.clientWidth, behavior: "smooth" });
    };
    const currentIndex = () => Math.round(track.scrollLeft / track.clientWidth);

    prevBtn.addEventListener("click", e => { e.stopPropagation(); goTo(currentIndex() - 1); });
    nextBtn.addEventListener("click", e => { e.stopPropagation(); goTo(currentIndex() + 1); });

    track.addEventListener("scroll", () => {
      const idx = currentIndex();
      [...dots.children].forEach((d, i) => d.classList.toggle("on", i === idx));
      count.textContent = (idx + 1) + "/" + images.length;
      prevBtn.style.visibility = idx === 0 ? "hidden" : "visible";
      nextBtn.style.visibility = idx === images.length - 1 ? "hidden" : "visible";
    });
    prevBtn.style.visibility = "hidden";
  }
}

document.querySelectorAll(".thumb-slider[data-key]").forEach(el => {
  const group = PHOTOS[el.dataset.key][Number(el.dataset.group)];
  buildSlider(el, group.images);
});
document.querySelectorAll(".thumb-slider[data-stay]").forEach(el => {
  buildSlider(el, STAY_PHOTOS[el.dataset.stay]);
});
roomSliderRegistry.forEach(({ id, photos }) => {
  const el = document.getElementById(id);
  if (el) buildSlider(el, photos);
});

// 라이트박스 (사진 크게 보기)
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const lightboxCount = document.getElementById("lightbox-count");
const lbPrev = lightbox.querySelector(".lb-arrow.prev");
const lbNext = lightbox.querySelector(".lb-arrow.next");
const lbClose = lightbox.querySelector(".lb-close");
let lbImages = [];
let lbIndex = 0;

function updateLightbox(){
  lightboxImg.src = "img/" + lbImages[lbIndex];
  lightboxCount.textContent = (lbIndex + 1) + "/" + lbImages.length;
  lbPrev.style.visibility = lbIndex === 0 ? "hidden" : "visible";
  lbNext.style.visibility = lbIndex === lbImages.length - 1 ? "hidden" : "visible";
}

function openLightbox(images, index){
  lbImages = images;
  lbIndex = index;
  updateLightbox();
  lightbox.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeLightbox(){
  lightbox.classList.remove("open");
  document.body.style.overflow = "";
}

lbPrev.addEventListener("click", () => { if (lbIndex > 0) { lbIndex--; updateLightbox(); } });
lbNext.addEventListener("click", () => { if (lbIndex < lbImages.length - 1) { lbIndex++; updateLightbox(); } });
lbClose.addEventListener("click", closeLightbox);
lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener("keydown", e => {
  if (!lightbox.classList.contains("open")) return;
  if (e.key === "Escape") closeLightbox();
  if (e.key === "ArrowLeft") lbPrev.click();
  if (e.key === "ArrowRight") lbNext.click();
});
</script>
