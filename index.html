<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2027 상반기 휴양지 여행 비교</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  @font-face{
    font-family:'GmarketSans';
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
    font-weight:500;
    font-style:normal;
  }
  @font-face{
    font-family:'GmarketSans';
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff');
    font-weight:700;
    font-style:normal;
  }
  :root{
    --sea-900:#013049;
    --sea-700:#00577d;
    --sea-500:#0f7fa8;
    --sea-300:#5db6cf;
    --sea-100:#e6f2f5;
    --sand:#f7f1e3;
    --accent:#00c189;
    --accent-bg:#e1faf1;
    --ok:#00a274;
    --ok-bg:#e1faf1;
    --fail:#c94b4b;
    --fail-bg:#fbeaea;
    --ink:#1b2a37;
    --muted:#6b7c8c;
    --card:#ffffff;
    --line:#e1e9ef;
    --radius:14px;
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:linear-gradient(180deg,var(--sea-100) 0%, #fff 320px);
    color:var(--ink);
    line-height:1.5;
    padding-bottom:60px;
  }
  header.hero{
    position:relative;
    overflow:hidden;
    background:
      linear-gradient(180deg, rgba(1,48,73,.18) 0%, rgba(1,48,73,.45) 100%),
      url('img/main.jpg') center 45%/cover no-repeat;
    color:#fff;
    padding:44px 20px 32px;
    text-align:center;
    min-height:220px;
  }
  header.hero h1{
    margin:0;
    font-family:'GmarketSans','Pretendard',sans-serif;
    font-size:1.6rem;
    font-weight:500;
    letter-spacing:.3px;
    text-shadow:0 2px 10px rgba(0,0,0,.35);
  }
  header.hero .sub{
    margin-top:8px;
    font-size:.85rem;
    color:rgba(255,255,255,.9);
    text-shadow:0 1px 6px rgba(0,0,0,.35);
  }
  .goal-badges{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-top:16px;
    flex-wrap:wrap;
  }
  .goal-badges span{
    background:rgba(255,255,255,.92);
    color:var(--sea-900);
    font-weight:700;
    padding:6px 14px;
    border-radius:999px;
    font-size:.85rem;
    box-shadow:0 2px 8px rgba(0,40,60,.18);
  }
  .wrap{
    max-width:720px;
    margin:0 auto;
    padding:0 16px;
  }
  .dates{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:18px;
    font-size:.8rem;
    color:rgba(255,255,255,.9);
    flex-wrap:wrap;
  }
  .dates span{
    background:rgba(0,0,0,.18);
    padding:4px 10px;
    border-radius:8px;
  }

  /* Tabs */
  .tabbar{
    position:sticky;
    top:0;
    z-index:20;
    background:#fff;
    border-bottom:1px solid var(--line);
    display:flex;
    gap:6px;
    padding:10px 16px;
    max-width:720px;
    margin:0 auto;
    overflow-x:auto;
  }
  .tabbar button{
    flex:1;
    min-width:110px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--muted);
    padding:10px 8px;
    border-radius:10px;
    font-size:.85rem;
    font-weight:600;
    cursor:pointer;
    line-height:1.3;
  }
  .tabbar button .em{
    display:block;
    font-size:.72rem;
    font-weight:400;
    margin-top:2px;
    opacity:.8;
  }
  .tabbar button.active{
    background:var(--sea-500);
    border-color:var(--sea-500);
    color:#fff;
  }

  section.country{
    display:none;
    padding-top:18px;
  }
  section.country.active{
    display:block;
  }

  .country-summary{
    background:var(--sea-100);
    border:1px solid #cfe6f3;
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:18px;
    font-size:.88rem;
    color:var(--sea-900);
  }

  h3.section-title{
    font-size:1rem;
    margin:22px 0 12px;
    padding-left:10px;
    border-left:4px solid var(--sea-500);
  }
  h3.section-title:first-of-type{ margin-top:0; }

  .flight-list{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .flight-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:0 1px 3px rgba(10,37,64,.06);
  }
  .flight-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 16px;
    background:var(--sea-900);
    color:#fff;
  }
  .flight-head .airline{
    font-weight:600;
    font-size:.95rem;
  }
  .flight-head .price{
    font-family:'GmarketSans','Pretendard',sans-serif;
    font-weight:700;
    font-size:1.02rem;
  }
  .flight-body{
    padding:10px 16px 14px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .flight-time{
    font-size:.85rem;
    color:var(--ink);
    padding:6px 0;
    border-bottom:1px dashed var(--line);
  }
  .flight-time:last-child{ border-bottom:none; }
  .flight-option + .flight-option{
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--line);
  }
  .opt-label{
    font-size:.72rem;
    font-weight:700;
    color:var(--sea-500);
    margin-bottom:4px;
  }
  .dir{
    display:inline-block;
    font-size:.68rem;
    font-weight:700;
    padding:2px 6px;
    border-radius:6px;
    margin-right:6px;
    vertical-align:middle;
  }
  .dir-out{ background:var(--accent-bg); color:var(--ok); }
  .dir-ret{ background:#eaf1fb; color:var(--sea-500); }
  .area-tag{
    display:inline-block;
    font-size:.68rem;
    font-weight:700;
    padding:2px 7px;
    border-radius:6px;
    background:rgba(255,255,255,.2);
    margin-right:4px;
    vertical-align:middle;
  }
  .highlight-note{ color:var(--accent) !important; font-weight:600; }
  .stay-thumb{ cursor:pointer; }
  .extra-options{ display:none; }
  .extra-options.show{ display:block; }
  .more-btn{
    width:100%;
    margin-top:8px;
    padding:8px;
    border:1px dashed #cbd8e0;
    background:#f8fafb;
    border-radius:8px;
    font-size:.78rem;
    color:var(--sea-500);
    font-weight:600;
    cursor:pointer;
  }
  .more-btn:hover{ background:var(--sea-100); }
  .flight-time a{
    color:var(--sea-500);
    font-weight:600;
    text-decoration:none;
  }
  .flight-time a:hover{ text-decoration:underline; }

  .feature-box{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    box-shadow:0 1px 3px rgba(10,37,64,.06);
  }
  .feature-tagline{
    font-family:'GmarketSans','Pretendard',sans-serif;
    font-size:.92rem;
    color:var(--sea-700);
    background:var(--sea-100);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:14px;
    text-align:center;
  }
  .feature-stats{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-bottom:16px;
  }
  .feature-stat{
    display:flex;
    gap:8px;
    font-size:.82rem;
  }
  .feature-stat .f-label{
    flex:0 0 82px;
    font-weight:700;
    color:var(--sea-500);
  }
  .feature-stat .f-value{ color:var(--ink); }
  .feature-heading{
    font-size:.85rem;
    font-weight:700;
    margin-bottom:6px;
  }
  .feature-heading.pros{ color:var(--ok); }
  .feature-heading.cons{ color:var(--fail); }
  .feature-box ul{
    margin:0 0 14px;
    padding-left:18px;
    font-size:.82rem;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    gap:5px;
  }
  .feature-box .feature-cons ul{ margin-bottom:0; }

  .placeholder-box{
    border:1px dashed #cbd8e0;
    border-radius:var(--radius);
    padding:20px 16px;
    text-align:center;
    color:var(--muted);
    font-size:.85rem;
    background:#f8fafb;
  }

  .photo-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  @media(min-width:560px){
    .photo-grid{grid-template-columns:1fr 1fr 1fr;}
  }
  .photo-card{
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
    background:#fff;
    cursor:pointer;
  }
  .photo-thumb{
    height:110px;
    background:#dde7ee;
    position:relative;
  }
  .photo-thumb img{
    width:100%;height:100%;object-fit:cover;display:block;
  }
  .photo-thumb .count-badge{
    position:absolute;
    bottom:6px;right:6px;
    background:rgba(0,0,0,.55);
    color:#fff;
    font-size:.68rem;
    padding:2px 7px;
    border-radius:999px;
  }
  .photo-card .photo-info{ padding:8px 10px 10px; }
  .photo-card .photo-name{ font-weight:700; font-size:.85rem; }
  .photo-card .photo-desc{ font-size:.72rem; color:var(--muted); margin-top:2px; }

  .lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    z-index:1000;
    align-items:center;
    justify-content:center;
  }
  .lightbox.open{display:flex;}
  .lightbox img{
    max-width:92vw;
    max-height:82vh;
    object-fit:contain;
  }
  .lightbox .lb-close{
    position:absolute;
    top:16px;
    right:16px;
    width:38px;
    height:38px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    color:#fff;
    font-size:1.2rem;
    cursor:pointer;
  }
  .lightbox .lb-arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:46px;
    height:46px;
    border:none;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    color:#fff;
    font-size:1.6rem;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .lightbox .lb-arrow:hover,
  .lightbox .lb-close:hover{background:rgba(255,255,255,.24);}
  .lightbox .lb-arrow.prev{left:12px;}
  .lightbox .lb-arrow.next{right:12px;}
  .lightbox .lb-count{
    position:absolute;
    bottom:20px;
    left:0;
    right:0;
    text-align:center;
    color:#fff;
    font-size:.85rem;
    opacity:.85;
  }

  .compare-scroll{
    overflow-x:auto;
    border:1px solid var(--line);
    border-radius:12px;
    background:#fff;
  }
  table.compare{
    width:100%;
    border-collapse:collapse;
    font-size:.82rem;
    white-space:nowrap;
  }
  table.compare th{
    background:var(--sea-100);
    color:var(--sea-900);
    font-weight:700;
    text-align:left;
    padding:10px 12px;
    border-bottom:1px solid var(--line);
  }
  table.compare td{
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    color:var(--ink);
  }
  table.compare tr:last-child td{border-bottom:none;}
  table.compare td.name{font-weight:700;color:var(--sea-700);}
  table.compare td.price{color:var(--accent);font-weight:700;}
  table.compare td.wrap-cell{ white-space:normal; max-width:150px; }
  .star-rating{ font-size:.95rem; letter-spacing:1px; }
  .star-fill{ color:#f2994a; }
  .star-empty{ color:#dbe3e9; }
  td.flight-time-cell{ white-space:normal; }
  td.flight-time-cell details summary{
    cursor:pointer;
    color:var(--sea-500);
    font-weight:600;
    list-style:none;
  }
  td.flight-time-cell details summary::-webkit-details-marker{ display:none; }
  td.flight-time-cell details summary::after{
    content:' ▸ 상세';
    font-size:.72rem;
    color:var(--muted);
    font-weight:400;
  }
  td.flight-time-cell details[open] summary::after{ content:' ▾ 접기'; }
  td.flight-time-cell .ft-detail{
    margin-top:6px;
    padding-top:6px;
    border-top:1px dashed var(--line);
    font-size:.78rem;
    color:var(--ink);
    min-width:180px;
  }
  td.flight-time-cell .ft-row{
    padding:4px 0;
  }
  td.flight-time-cell .ft-row + .ft-row{
    margin-top:4px;
    border-top:1px dashed var(--line);
  }
  .compare-note{
    font-size:.76rem;
    color:var(--muted);
    margin-top:8px;
  }

  footer{
    text-align:center;
    font-size:.75rem;
    color:var(--muted);
    margin-top:40px;
  }
</style>
</head>
<body>

<header class="hero">
  <h1>🏖️ 2027 상반기 휴양지 여행 비교</h1>
  <div class="sub">아직 나라 미정 · 후보지 비교 중</div>
  <div class="dates">
    <span>2/24(수) 출발</span>
    <span>2/28(일) 복귀 (예정)</span>
  </div>
  <div class="goal-badges"><span>👩‍👩‍👧 여행인원 3명</span></div>
</header>

<nav class="tabbar" id="tabbar">
  <button class="country-btn active" data-country="all">📊 전체 비교<span class="em">한눈에 보기</span></button>
  <button class="country-btn" data-country="phuket">🇹🇭 푸켓<span class="em">태국</span></button>
  <button class="country-btn" data-country="bohol">🇵🇭 보홀<span class="em">필리핀</span></button>
  <button class="country-btn" data-country="phuquoc">🇻🇳 푸꾸옥<span class="em">베트남</span></button>
</nav>

<div class="wrap">

  <div id="country-sections"></div>

  <!-- 국가별 한눈에 비교 -->
  <section class="country active" id="country-all">
    <h3 class="section-title">📊 국가별 한눈에 비교</h3>
    <div class="compare-scroll">
      <table class="compare">
        <thead>
          <tr>
            <th>여행지</th>
            <th>바다시야</th>
            <th>리조트</th>
            <th>최저 항공가</th>
            <th>비행시간</th>
            <th>숙소</th>
          </tr>
        </thead>
        <tbody id="compare-body"></tbody>
      </table>
    </div>
    <p class="compare-note">항공권은 네이버 항공권 26/07/21 기준 · 숙소는 구글 예약 기준 시세입니다.</p>
  </section>

</div>

<footer>2027 상반기 휴양지 여행 비교 · 개인용 자료</footer>

<div class="lightbox" id="lightbox">
  <button class="lb-close" type="button" aria-label="닫기">✕</button>
  <button class="lb-arrow prev" type="button" aria-label="이전 사진">‹</button>
  <img id="lightbox-img" src="" alt="">
  <button class="lb-arrow next" type="button" aria-label="다음 사진">›</button>
  <div class="lb-count" id="lightbox-count"></div>
</div>

<script>
// 국가별 데이터 (항공권/숙소, 나중에 숙소 항목만 채우면 됨)

function stars(n){
  return `<span class="star-rating" title="${n}/5"><span class="star-fill">${"★".repeat(n)}</span><span class="star-empty">${"★".repeat(5 - n)}</span></span>`;
}

function minPrice(flights){
  const nums = flights.map(f => parseInt((f.price.match(/\d+/) || [null])[0], 10)).filter(n => !isNaN(n));
  return nums.length ? Math.min(...nums) : null;
}

// 탭 전환
document.getElementById("tabbar").addEventListener("click", e => {
  const btn = e.target.closest(".country-btn");
  if (!btn) return;
  document.querySelectorAll(".country-btn").forEach(b => b.classList.toggle("active", b === btn));
  document.querySelectorAll("section.country").forEach(s => s.classList.toggle("active", s.id === "country-" + btn.dataset.country));
});

// 항공권 더보기 / 사진 클릭 → 라이트박스
sectionsWrap.addEventListener("click", e => {
  const moreBtn = e.target.closest(".more-btn");
  if (moreBtn) {
    const target = document.getElementById(moreBtn.dataset.target);
    const shown = target.classList.toggle("show");
    moreBtn.textContent = shown ? "접기 ▴" : moreBtn.dataset.label;
    return;
  }
  const card = e.target.closest(".photo-card");
  if (card) {
    const group = PHOTOS[card.dataset.key][Number(card.dataset.group)];
    openLightbox(group.images, 0);
    return;
  }
  const stayThumb = e.target.closest(".stay-thumb");
  if (stayThumb) {
    openLightbox(STAY_PHOTOS[stayThumb.dataset.stay], 0);
  }
});

// 라이트박스 (사진 크게 보기)
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
const lightboxCount = document.getElementById("lightbox-count");
const lbPrev = lightbox.querySelector(".lb-arrow.prev");
const lbNext = lightbox.querySelector(".lb-arrow.next");
const lbClose = lightbox.querySelector(".lb-close");
let lbImages = [];
let lbIndex = 0;

function updateLightbox(){
  lightboxImg.src = "img/" + lbImages[lbIndex];
  lightboxCount.textContent = (lbIndex + 1) + "/" + lbImages.length;
  lbPrev.style.visibility = lbIndex === 0 ? "hidden" : "visible";
  lbNext.style.visibility = lbIndex === lbImages.length - 1 ? "hidden" : "visible";
}

function openLightbox(images, index){
  lbImages = images;
  lbIndex = index;
  updateLightbox();
  lightbox.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeLightbox(){
  lightbox.classList.remove("open");
  document.body.style.overflow = "";
}

lbPrev.addEventListener("click", () => { if (lbIndex > 0) { lbIndex--; updateLightbox(); } });
lbNext.addEventListener("click", () => { if (lbIndex < lbImages.length - 1) { lbIndex++; updateLightbox(); } });
lbClose.addEventListener("click", closeLightbox);
lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener("keydown", e => {
  if (!lightbox.classList.contains("open")) return;
  if (e.key === "Escape") closeLightbox();
  if (e.key === "ArrowLeft") lbPrev.click();
  if (e.key === "ArrowRight") lbNext.click();
});
</script>
